<!DOCTYPE html>
<html lang="" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="skill.title">Skill 详情 - Skill Base</title>
  
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans:['Inter', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            base: {
              950: '#09090b',
              900: '#13141a',
              800: '#27272a',
              400: '#a1a1aa',
              200: '#e4e4e7',
            },
            neon: {
              400: '#00FFA3',
              500: '#00E592',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* 基础覆写 */
    body {
      background-color: #09090b;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 64px 64px;
      color: #e4e4e7;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    ::selection {
      background: rgba(0, 255, 163, 0.3);
      color: #fff;
    }


    
    /* Loading Spinner */
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top: 3px solid #00FFA3;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
    }
    .spinner-sm {
      width: 16px;
      height: 16px;
      border-width: 2px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Skill Info 卡片 */
    #skill-info {
      background-color: #13141a;
      border: 1px solid #27272a;
      border-radius: 0.75rem;
      padding: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      margin-bottom: 1.5rem;
    }
    .skill-header h1.skill-title {
      font-size: 1.875rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .skill-header h1.skill-title::before {
      content: '>';
      color: #00FFA3;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      opacity: 0.7;
    }
    .skill-desc {
      color: #a1a1aa;
      font-size: 0.875rem;
      line-height: 1.625;
      max-width: 64rem;
      margin-bottom: 1.5rem;
    }
    .skill-meta { display: none; }
    .skill-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-top: 1.5rem;
      border-top: 1px solid #27272a;
    }
    @media (min-width: 640px) {
      .skill-actions {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }
    .skill-actions .version-select {
      width: 100%;
      max-width: 24rem;
      appearance: none;
      background-color: #09090b;
      border: 1px solid #27272a;
      color: white;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      border-radius: 0.5rem;
      padding: 0.625rem 1rem;
      outline: none;
      cursor: pointer;
    }
    .skill-actions .version-select:focus {
      border-color: #00FFA3;
      box-shadow: 0 0 0 1px #00FFA3;
    }
    .skill-actions button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-family: 'JetBrains Mono', monospace;
      padding: 0.625rem 1.25rem;
      border-radius: 0.5rem;
      transition: all 0.2s;
      width: 100%;
    }
    @media (min-width: 640px) { .skill-actions button { width: auto; } }
    .skill-actions .btn-secondary {
      background: transparent;
      color: white;
      border: 1px solid #27272a;
    }
    .skill-actions .btn-secondary:hover { background-color: #27272a; }
    .skill-actions .btn-primary {
      background: transparent;
      border: 1px solid #00E592;
      color: #00FFA3;
      box-shadow: 0 0 15px rgba(0,255,163,0.1);
    }
    .skill-actions .btn-primary:hover {
      background-color: rgba(0,255,163,0.1);
      box-shadow: 0 0 20px rgba(0,255,163,0.2);
    }

    /* 文件树 */
    #file-tree {
      padding: 0.75rem;
      flex: 1;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
    }
    .file-tree-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.5rem;
      cursor: pointer;
      color: #a1a1aa;
      border-radius: 0.375rem;
      transition: all 0.2s;
    }
    .file-tree-item:hover, .file-tree-item.selected {
      color: #00FFA3;
      background-color: rgba(0,255,163,0.05);
    }
    .file-tree-item .icon { font-size: 0.875rem; opacity: 0.7; }
    .file-tree-item.selected svg { color: #00FFA3; opacity: 1; }
    .file-tree-folder > .file-tree-item { color: white; }

    .file-tree-item .name { font-size: 0.875rem; }
    .file-tree-item.selected { font-weight: 500; }
    
    #file-tree ul {
      list-style: none;
      margin: 0;
      padding-left: 1.5rem;
    }
    #file-tree > ul {
      padding-left: 0;
    }
    .file-tree-folder > ul {
      padding-left: 1.5rem;
      position: relative;
    }
    .file-tree-folder > ul::before {
      content: '';
      position: absolute;
      left: 1rem;
      top: 0;
      bottom: 0.75rem;
      width: 1px;
      background-color: #27272a;
    }
    .file-tree-folder:not(.open) > ul { display: none; }

    /* 版本历史 */
    #version-list {
      position: relative;
      padding-left: 1.5rem;
      margin-left: 0.75rem;
      border-left: 1px solid #27272a;
      padding-bottom: 0.5rem;
      margin-top: 1rem;
    }
    .version-item {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0;
      margin-bottom: 2rem;
      border-bottom: none;
      background: transparent !important;
    }
    .version-item::before {
      content: '';
      position: absolute;
      left: -1.8125rem;
      top: 0.25rem;
      width: 0.625rem;
      height: 0.625rem;
      border-radius: 50%;
      background-color: #27272a;
      box-shadow: 0 0 0 4px #13141a;
      transition: background-color 0.2s;
    }
    .version-item:hover::before { background-color: #00E592; }
    .version-item:first-child::before {
      background-color: #00FFA3;
      box-shadow: 0 0 0 4px #13141a, 0 0 8px rgba(0,255,163,0.8);
    }
    .version-tag {
      display: inline-block;
      align-self: flex-start;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      padding: 0.125rem 0.5rem;
      border-radius: 0.25rem;
      border: 1px solid #27272a;
      color: #a1a1aa;
      transition: all 0.2s;
    }
    .version-item:hover .version-tag {
      border-color: rgba(0,255,163,0.3);
      color: #00FFA3;
    }
    .version-tag.latest {
      border-color: rgba(0,255,163,0.3);
      color: #00FFA3;
      background-color: rgba(0,255,163,0.05);
    }
    .version-item-info { flex: 1; }
    .version-item-changelog {
      font-size: 0.875rem;
      color: white;
      font-weight: 500;
      margin-top: 0.5rem;
    }
    .version-item-meta {
      font-size: 0.75rem;
      color: #a1a1aa;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 0.25rem;
      display: flex;
      gap: 0.75rem;
    }
    #version-history.collapsed #version-list {
      display: none;
    }
    #version-history .version-history-toggle svg {
      transition: transform 0.2s;
    }
    #version-history.collapsed .version-history-toggle svg {
      transform: rotate(-90deg);
    }

    /* 隐藏旧版 CSS 中的 collaborators 和 version 样式，因为已使用 Tailwind 重写 HTML */
    .collaborator-item { display: none; }
    .version-item { display: none; }
    /* 重置为 flex 以便 tailwind 生效 */
    .version-item.mb-8 { display: flex !important; }
    .collaborator-item.group { display: flex !important; }
    
    /* Markdown 预览样式 */
    .markdown-body {
      color: #e4e4e7;
      line-height: 1.8;
      max-width: 100%;
      overflow-wrap: break-word;
      font-family: 'Inter', sans-serif;
    }
    .markdown-body pre { background-color: #09090b; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; border: 1px solid #27272a; }
    .markdown-body code { background-color: #09090b; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-family: "JetBrains Mono", monospace; font-size: 0.875em; border: 1px solid #27272a; }
    .markdown-body pre code { background: none; border: none; padding: 0; }
    .markdown-body a { color: #00FFA3; text-decoration: underline; text-underline-offset: 4px; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { font-weight: 700; margin-top: 1.5em; margin-bottom: 0.5em; color: white; }
    .markdown-body h1 { font-size: 1.5rem; }
    .markdown-body h2 { font-size: 1.25rem; border-bottom: 1px solid #27272a; padding-bottom: 0.3em; }
    .markdown-body ul, .markdown-body ol { padding-left: 2em; margin-bottom: 1em; }
    .markdown-body li { margin-bottom: 0.25em; list-style: disc; }
    .markdown-body p { margin-bottom: 1em; }
    .markdown-body blockquote { border-left: 4px solid #27272a; padding-left: 1em; color: #a1a1aa; margin: 1em 0; }
    .markdown-body table { width: 100%; border-collapse: collapse; margin: 1em 0; }
    .markdown-body th, .markdown-body td { border: 1px solid #27272a; padding: 0.5em 1em; text-align: left; }
    .markdown-body th { background-color: #09090b; }

    /* Modals */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
    }
    .modal-content {
      position: relative;
      background-color: #13141a;
      border: 1px solid #27272a;
      border-radius: 0.75rem;
      width: 90%;
      max-width: 420px;
      padding: 1.5rem;
      color: #e4e4e7;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .modal-header h3 { font-size: 1.25rem; font-weight: 600; color: white; margin: 0; }
    .modal-close { background: none; border: none; color: #a1a1aa; font-size: 1.5rem; cursor: pointer; }
    .modal-close:hover { color: white; }
    .modal-body { margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #a1a1aa; }
    .form-input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      background-color: #09090b;
      border: 1px solid #27272a;
      border-radius: 0.5rem;
      color: white;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      box-sizing: border-box;
    }
    .form-input:focus { outline: none; border-color: #00E592; box-shadow: 0 0 0 1px #00E592; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }
    .btn { cursor: pointer; }
    .modal-footer .btn {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .modal-footer .btn-secondary {
      background: transparent;
      border: 1px solid #27272a;
      color: white;
    }
    .modal-footer .btn-secondary:hover { background-color: #27272a; }
    .modal-footer .btn-primary {
      background-color: rgba(0,255,163,0.1);
      border: 1px solid #00E592;
      color: #00FFA3;
    }
    .modal-footer .btn-primary:hover { background-color: rgba(0,255,163,0.2); }
    .modal-footer .btn-danger {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #f87171;
    }
    .modal-footer .btn-danger:hover { background-color: rgba(239, 68, 68, 0.2); }
    .warning-text { color: #f87171; font-size: 0.875rem; margin-bottom: 1rem; }

    /* File Tree & File Content overriding old flex issues */
    #file-tree {
      display: block;
    }
    #file-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 搜索联想 */
    .suggestions-container { position: relative; }
    .suggestions-dropdown {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: #13141a;
      border: 1px solid #27272a;
      border-top: none;
      border-radius: 0 0 0.5rem 0.5rem;
      max-height: 200px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }
    .suggestions-dropdown.is-open { display: block; }
    .suggestion-item {
      padding: 0.625rem 0.75rem;
      cursor: pointer;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 1px solid #27272a;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background-color: #27272a; }
    .suggestion-item-name { color: white; font-weight: 500; }
    .suggestion-item-username { color: #a1a1aa; font-family: 'JetBrains Mono', monospace; }
    .suggestion-empty { padding: 0.625rem 0.75rem; color: #a1a1aa; text-align: center; font-size: 0.875rem; }

    .md-view-btn {
      padding: 0.25rem 0.625rem;
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid #27272a;
      background: transparent;
      color: #a1a1aa;
      cursor: pointer;
      border-radius: 0.25rem;
      transition: all 0.2s;
    }
    .md-view-btn:hover {
      color: white;
      border-color: #a1a1aa;
    }
    .md-view-btn.is-active {
      background: rgba(0,255,163,0.1);
      color: #00FFA3;
      border: 1px solid #00E592;
    }

    /* Markdown 源码预览 */
    .md-source-pre {
      width: 100%;
      margin: 0;
      padding: 1rem;
      background-color: #09090b;
      border: 1px solid #27272a;
      border-radius: 0.5rem;
      overflow-x: auto;
      text-align: left;
    }
    .md-source-pre code {
      background: none;
      border: none;
      padding: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      line-height: 1.6;
      color: #e4e4e7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* 内容区域有实际内容时重置居中 */
    #file-content:has(.markdown-body),
    #file-content:has(.md-source-pre),
    #file-content:has(pre > code.hljs) {
      display: block;
      align-items: stretch;
      justify-content: flex-start;
      padding: 1.5rem;
    }

    /* 全屏模式 */
    #file-preview-panel.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      max-height: none;
      min-height: 100vh;
      border-radius: 0;
      border: none;
    }
    #file-preview-panel.fullscreen #file-content {
      max-height: calc(100vh - 52px);
    }
    #file-preview-panel.fullscreen .rounded-t-xl {
      border-radius: 0;
    }
    /* 全屏内容宽度限制 */
    #file-preview-panel.fullscreen #file-content > .markdown-body,
    #file-preview-panel.fullscreen #file-content > .md-source-pre,
    #file-preview-panel.fullscreen #file-content > pre {
      max-width: 72ch;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
    }
  </style>
</head>
<body class="text-base-200 font-sans min-h-screen pb-16 selection:bg-neon-400/30 selection:text-white">

  <!-- 导航栏 -->
  <skill-base-nav
      current-path="/skill.html"
      items='[{"href":"/","label":"Home","i18n":"nav.home"},{"href":"/publish.html","label":"Publish","i18n":"nav.publish"}]'>
  </skill-base-nav>

  <!-- 主体内容 -->
  <main class="page-content max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8">
    
    <!-- 面包屑 (终端路径风格) -->
    <div class="text-sm text-base-400 font-mono mb-6 flex items-center gap-2">
      <span class="text-neon-400">~</span>
      <span class="opacity-50">/</span>
      <a href="/" class="hover:text-white transition-colors" data-i18n="skill.breadcrumbHome">home</a>
      <span class="opacity-50">/</span>
      <span class="text-white" id="breadcrumb-name" data-i18n="state.loading">加载中...</span>
    </div>

    <!-- Skill 基本信息 -->
    <div id="skill-info" class="bg-base-900 border border-base-800 rounded-xl p-6 mb-6 shadow-2xl shadow-black/50 relative overflow-hidden">
      <div class="loading-content flex justify-center py-8">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- 文件树与预览区 (1:3 比例) -->
    <section class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-6">
      <!-- 左侧文件树 -->
      <div class="bg-base-900 border border-base-800 rounded-xl flex flex-col min-h-[400px] max-h-[500px]">
        <div class="px-5 py-3 border-b border-base-800 font-mono text-sm text-base-400 flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-base-800"></span>
          <span class="w-2.5 h-2.5 rounded-full bg-base-800"></span>
          <span class="w-2.5 h-2.5 rounded-full bg-base-800"></span>
          <span class="ml-2 text-white/50" data-i18n="skill.fileDir">ls -la</span>
        </div>
        <div id="file-tree" class="p-3 flex-1 overflow-y-auto no-scrollbar font-mono text-sm">
          <div class="loading-content flex justify-center py-8">
            <div class="spinner spinner-sm"></div>
          </div>
        </div>
      </div>

      <!-- 右侧预览区 -->
      <div id="file-preview-panel" class="lg:col-span-3 bg-base-900 border border-base-800 rounded-xl flex flex-col min-h-[400px] max-h-[500px]">
        <div class="px-5 py-3 border-b border-base-800 text-sm font-mono text-base-400 bg-base-950/50 rounded-t-xl flex justify-between items-center">
          <div>
            <span>cat <span class="text-white/30" id="file-preview-path" data-i18n="skill.selectFile">&lt;file&gt;</span></span>
          </div>
          <div class="flex items-center gap-3">
            <div id="file-preview-md-actions" class="flex gap-2" hidden>
              <button type="button" id="md-view-render" class="md-view-btn is-active" data-i18n="skill.htmlPreview">HTML 预览</button>
              <button type="button" id="md-view-source" class="md-view-btn" data-i18n="skill.mdSource">Markdown 源码</button>
            </div>
            <button type="button" id="fullscreen-btn" class="md-view-btn" onclick="toggleFullscreen()" title="全屏">
              <svg id="fullscreen-icon-expand" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
              <svg id="fullscreen-icon-collapse" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
        <div id="file-content" class="flex-1 flex flex-col items-center justify-center overflow-auto text-base-400 p-8">
          <div class="flex items-center gap-3 opacity-30 font-mono mb-4">
            <span class="text-neon-400 animate-pulse">_</span>
            <span>EOF</span>
          </div>
          <p class="text-sm font-mono" data-i18n="skill.clickFile">Click a file on the left to preview</p>
        </div>
      </div>
    </section>

    <!-- 底部网格：Team (1/3) & Version History (2/3) -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- 左侧：团队微件 -->
      <div id="collaborators-panel" class="bg-base-900 border border-base-800 rounded-xl h-fit" style="display:none;">
        <div class="px-5 py-4 border-b border-base-800 font-mono font-semibold text-white flex items-center justify-between text-sm">
          <div class="flex items-center gap-2">
            <span class="text-neon-400">#</span> <span data-i18n="skill.team">Collaborators</span>
          </div>
          <button id="add-collaborator-btn" class="text-xs text-neon-400 hover:text-white transition-colors" style="display:none;" data-i18n="skill.addCollaborator">+ Add</button>
        </div>
        <div id="collaborators-list" class="p-5 flex flex-col gap-4">
          <!-- 由 JS 动态渲染 -->
        </div>
        <div id="skill-danger-zone" class="px-5 pb-5 pt-0" style="display:none;">
          <div class="border-t border-base-800 pt-4">
            <button id="delete-skill-btn" class="w-full py-2 text-xs font-mono text-red-500 border border-red-500/30 rounded bg-red-500/5 hover:bg-red-500/10 transition-colors" data-i18n="skill.deleteSkill">Delete Skill</button>
          </div>
        </div>
      </div>

      <!-- 右侧：版本历史时间轴 -->
      <div id="version-history" class="lg:col-span-2 bg-base-900 border border-base-800 rounded-xl">
        <div class="px-5 py-4 border-b border-base-800 flex items-center justify-between rounded-t-xl cursor-pointer hover:bg-base-950/30 transition-colors" onclick="toggleVersionHistory()">
          <div class="flex items-center gap-2 font-mono font-semibold text-white text-sm">
            <span class="text-neon-400">git</span> <span data-i18n="skill.versionHistory">log</span>
          </div>
          <span class="version-history-toggle text-base-400">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </span>
        </div>
        <div class="p-6 overflow-hidden">
          <div id="version-list">
            <div class="loading-content flex justify-center py-8">
              <div class="spinner spinner-sm"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 添加协作者弹窗 -->
  <div id="add-collaborator-modal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 data-i18n="collab.modal">添加协作者</h3>
        <button class="modal-close" onclick="closeCollaboratorModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group suggestions-container">
          <label data-i18n="collab.usernameLabel">用户名</label>
          <input type="text" id="collaborator-username" data-i18n-placeholder="collab.usernamePlaceholder" placeholder="输入用户名" class="form-input" autocomplete="off">
          <div id="user-suggestions" class="suggestions-dropdown"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCollaboratorModal()" data-i18n="btn.cancel">取消</button>
        <button class="btn btn-primary" onclick="submitAddCollaborator()" data-i18n="btn.add">添加</button>
      </div>
    </div>
  </div>

  <!-- 删除 Skill 确认弹窗 -->
  <div id="delete-skill-modal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 data-i18n="collab.deleteModal">确认删除</h3>
        <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p class="warning-text" data-i18n="collab.deleteWarning">⚠️ 此操作不可恢复！将删除该 Skill 的所有版本和数据。</p>
        <div class="form-group">
          <label data-i18n="collab.deleteLabel">请输入 Skill ID 确认删除：</label>
          <input type="text" id="delete-confirm-input" placeholder="" class="form-input">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeDeleteModal()" data-i18n="btn.cancel">取消</button>
        <button class="btn btn-danger" onclick="submitDeleteSkill()" data-i18n="collab.deleteConfirmBtn">确认删除</button>
      </div>
    </div>
  </div>

  <!-- CDN 库 -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

  <!-- 引入 JS -->
  <script src="/js/i18n.js"></script>
  <script src="/js/components/skill-base-nav.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/skill.js"></script>
  <script src="/js/collaborators.js"></script>
</body>
</html>
