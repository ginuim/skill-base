<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill 详情 - Skill Base</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- highlight.js 样式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
  <style>
    /* 面包屑导航 */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: var(--spacing-lg);
    }

    .breadcrumb a {
      color: var(--text-secondary);
    }

    .breadcrumb a:hover {
      color: var(--primary-color);
    }

    .breadcrumb-separator {
      color: var(--text-muted);
    }

    /* Skill 信息区域 */
    .skill-info {
      background-color: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .skill-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }

    .skill-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-color);
      margin: 0;
    }

    .skill-desc {
      color: var(--text-secondary);
      margin-bottom: var(--spacing-md);
      line-height: 1.6;
    }

    .skill-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-lg);
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .skill-meta-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    /* 版本选择器和操作按钮 */
    .skill-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--spacing-md);
      margin-top: var(--spacing-lg);
      padding-top: var(--spacing-md);
      border-top: 1px solid var(--border-color);
    }

    .version-select {
      min-width: 200px;
    }

    /* 左右分栏布局（minmax(0,1fr) 防止右侧被长内容撑开整页） */
    .skill-content {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    /* 文件树面板 */
    .file-tree-panel {
      background-color: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--spacing-md);
      max-height: calc(100vh - 300px);
      overflow-y: auto;
    }

    .file-tree-panel-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-color);
      margin-bottom: var(--spacing-md);
      padding-bottom: var(--spacing-sm);
      border-bottom: 1px solid var(--border-color);
    }

    /* 文件预览面板 */
    .file-preview-panel {
      background-color: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 400px;
      max-height: 900px;
      overflow-y: auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .file-preview-header {
      padding: var(--spacing-md) var(--spacing-lg);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-md);
      flex-wrap: wrap;
    }

    .file-preview-path {
      flex: 1;
      min-width: 0;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 0.875rem;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-preview-md-actions {
      flex-shrink: 0;
    }

    .md-view-toggle {
      display: inline-flex;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .md-view-btn {
      padding: 0.25rem 0.625rem;
      font-size: 0.8125rem;
      border: none;
      background: var(--bg-color);
      color: var(--text-secondary);
      cursor: pointer;
    }

    .md-view-btn + .md-view-btn {
      border-left: 1px solid var(--border-color);
    }

    .md-view-btn.is-active {
      background: var(--white);
      color: var(--text-color);
      font-weight: 500;
    }

    .file-preview-content {
      flex: 1;
      min-width: 0;
      padding: var(--spacing-lg);
      overflow: auto;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .file-preview-content pre {
      margin: 0;
      padding: var(--spacing-md);
      background-color: var(--bg-color);
      border-radius: var(--radius);
      overflow-x: hidden;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .file-preview-content code {
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 0.8125rem;
      line-height: 1.6;
    }

    .file-preview-content > pre code,
    .file-preview-content pre code {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    /* Markdown 预览样式 */
    .markdown-body {
      line-height: 1.8;
      max-width: 100%;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .markdown-body pre {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      overflow-x: hidden;
      max-width: 100%;
    }

    .markdown-body pre code {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    /* 宽表格在面板内横向滚动，不撑开栅格 */
    .markdown-body .md-table-wrap {
      max-width: 100%;
      overflow-x: auto;
    }

    .markdown-body .md-table-wrap table {
      width: max-content;
      max-width: none;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 600;
    }

    .markdown-body h1 { font-size: 1.5rem; }
    .markdown-body h2 { font-size: 1.25rem; }
    .markdown-body h3 { font-size: 1.125rem; }

    .markdown-body p {
      margin-bottom: 1em;
    }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 2em;
      margin-bottom: 1em;
    }

    .markdown-body li {
      list-style: disc;
      margin-bottom: 0.25em;
    }

    .markdown-body ol li {
      list-style: decimal;
    }

    .markdown-body code {
      background-color: var(--bg-color);
      padding: 0.125em 0.375em;
      border-radius: var(--radius-sm);
      font-size: 0.875em;
    }

    .markdown-body pre code {
      background: none;
      padding: 0;
    }

    .markdown-body blockquote {
      border-left: 4px solid var(--border-color);
      padding-left: 1em;
      color: var(--text-secondary);
      margin: 1em 0;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid var(--border-color);
      padding: 0.5em 1em;
      text-align: left;
    }

    .markdown-body th {
      background-color: var(--bg-color);
    }

    /* 版本历史 */
    .version-history {
      background-color: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .version-history-header {
      padding: var(--spacing-md) var(--spacing-lg);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .version-history-header:hover {
      background-color: var(--bg-color);
    }

    .version-history-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-color);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .version-history-toggle {
      color: var(--text-muted);
      transition: var(--transition);
    }

    .version-history.collapsed .version-history-toggle {
      transform: rotate(-90deg);
    }

    .version-history-list {
      padding: 0;
      max-height: 400px;
      overflow-y: auto;
    }

    .version-history.collapsed .version-history-list {
      display: none;
    }

    .version-item {
      padding: var(--spacing-md) var(--spacing-lg);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: flex-start;
      gap: var(--spacing-md);
    }

    .version-item:last-child {
      border-bottom: none;
    }

    .version-item:hover {
      background-color: var(--bg-color);
    }

    .version-item-tag {
      flex-shrink: 0;
    }

    .version-item-info {
      flex: 1;
      min-width: 0;
    }

    .version-item-changelog {
      font-size: 0.875rem;
      color: var(--text-color);
      margin-bottom: var(--spacing-xs);
    }

    .version-item-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      gap: var(--spacing-md);
    }

    /* 空状态 */
    .empty-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 300px;
      color: var(--text-muted);
    }

    .empty-preview-icon {
      font-size: 3rem;
      margin-bottom: var(--spacing-md);
      opacity: 0.5;
    }

    /* Loading */
    .loading-content {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }

    /* 二进制文件提示 */
    .binary-notice {
      text-align: center;
      padding: var(--spacing-xl);
      color: var(--text-secondary);
    }

    .binary-notice-icon {
      font-size: 3rem;
      margin-bottom: var(--spacing-md);
    }

    /* 协作者面板 */
    .collaborators-panel {
      margin-top: var(--spacing-lg);
      padding: var(--spacing-lg);
      background-color: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .collaborators-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-md);
    }

    .collaborators-panel .panel-header h3 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0;
    }

    .collaborators-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .collaborator-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-sm) var(--spacing-md);
      background-color: var(--bg-color);
      border-radius: var(--radius-sm, 4px);
    }

    .collaborator-info {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .collaborator-role {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 10px;
      background-color: var(--primary-color);
      color: var(--white);
      font-weight: 500;
    }

    .collaborator-role.owner {
      background-color: #f59e0b;
    }

    .danger-zone {
      margin-top: var(--spacing-lg);
      padding-top: var(--spacing-lg);
      border-top: 1px solid var(--border-color);
    }

    .btn-danger {
      background-color: #ef4444;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: var(--radius-sm, 4px);
      cursor: pointer;
    }

    .btn-danger:hover {
      background-color: #dc2626;
    }

    /* 弹窗样式 */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      position: relative;
      background-color: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 90%;
      max-width: 420px;
      padding: var(--spacing-lg);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-md);
    }

    .modal-header h3 {
      margin: 0;
      font-size: 1.125rem;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-secondary);
      line-height: 1;
    }

    .modal-body {
      margin-bottom: var(--spacing-lg);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: var(--spacing-sm);
    }

    .form-group {
      margin-bottom: var(--spacing-md);
    }

    .form-group label {
      display: block;
      margin-bottom: var(--spacing-xs);
      font-size: 0.875rem;
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm, 4px);
      font-size: 0.875rem;
      background-color: var(--bg-color);
      color: var(--text-color);
      box-sizing: border-box;
    }

    .warning-text {
      color: #ef4444;
      font-size: 0.875rem;
      margin-bottom: var(--spacing-md);
    }

    /* 协作者 username 小字 */
    .collaborator-username {
      color: var(--text-muted);
      font-size: 0.8125rem;
      margin-left: 4px;
    }

    /* 联想搜索下拉 */
    .suggestions-container {
      position: relative;
    }

    .suggestions-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--white);
      border: 1px solid var(--border-color);
      border-top: none;
      border-radius: 0 0 var(--radius-sm, 4px) var(--radius-sm, 4px);
      max-height: 200px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }

    .suggestions-dropdown.is-open {
      display: block;
    }

    .suggestion-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .suggestion-item:hover,
    .suggestion-item.is-active {
      background-color: var(--bg-color);
    }

    .suggestion-item-name {
      color: var(--text-color);
      font-weight: 500;
    }

    .suggestion-item-username {
      color: var(--text-muted);
      font-size: 0.8125rem;
    }

    .suggestion-empty {
      padding: 8px 12px;
      font-size: 0.875rem;
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 768px) {
      .skill-content {
        grid-template-columns: 1fr;
      }

      .file-tree-panel {
        max-height: 300px;
      }

      .skill-header {
        flex-direction: column;
      }

      .skill-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .version-select {
        width: 100%;
      }
    }
  </style>
</head>
<body class="app-devtools">
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">
        <svg class="navbar-brand-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span>Skill Base</span>
      </a>
      <div class="navbar-nav">
        <a href="/">首页</a>
        <a href="/publish.html" class="hide-mobile">发布</a>
      </div>
    </div>
  </nav>

  <!-- 页面内容 -->
  <main class="page-content">
    <div class="container">
      <!-- 面包屑导航 -->
      <nav class="breadcrumb">
        <a href="/">首页</a>
        <span class="breadcrumb-separator">›</span>
        <span id="breadcrumb-name">加载中...</span>
      </nav>

      <!-- Skill 基本信息 -->
      <section class="skill-info" id="skill-info">
        <div class="loading-content">
          <div class="spinner"></div>
        </div>
      </section>

      <!-- 左右分栏：目录树 + 文件预览 -->
      <section class="skill-content">
        <!-- 文件树面板 -->
        <div class="file-tree-panel">
          <div class="file-tree-panel-title">文件目录</div>
          <div id="file-tree" class="file-tree">
            <div class="loading-content">
              <div class="spinner spinner-sm"></div>
            </div>
          </div>
        </div>

        <!-- 文件预览面板 -->
        <div class="file-preview-panel">
          <div class="file-preview-header">
            <span id="file-preview-path" class="file-preview-path">选择文件以预览</span>
            <div id="file-preview-md-actions" class="file-preview-md-actions" hidden>
              <div class="md-view-toggle" role="group" aria-label="Markdown 显示方式">
                <button type="button" id="md-view-render" class="md-view-btn is-active">HTML 预览</button>
                <button type="button" id="md-view-source" class="md-view-btn">Markdown 源码</button>
              </div>
            </div>
          </div>
          <div id="file-content" class="file-preview-content">
            <div class="empty-preview">
              <div class="empty-preview-icon">📄</div>
              <p>点击左侧文件查看内容</p>
            </div>
          </div>
        </div>
      </section>

      <!-- 协作者管理 -->
      <div id="collaborators-panel" class="collaborators-panel" style="display:none;">
        <div class="panel-header">
          <h3>管理团队</h3>
          <button id="add-collaborator-btn" class="btn btn-primary btn-sm" style="display:none;">+ 添加协作者</button>
        </div>
        <div id="collaborators-list" class="collaborators-list">
          <!-- 由 JS 动态渲染 -->
        </div>
        <div id="skill-danger-zone" class="danger-zone" style="display:none;">
          <button id="delete-skill-btn" class="btn btn-danger btn-sm">删除 Skill</button>
        </div>
      </div>

      <!-- 版本历史 -->
      <section class="version-history" id="version-history">
        <div class="version-history-header" onclick="toggleVersionHistory()">
          <h3 class="version-history-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            版本历史
          </h3>
          <span class="version-history-toggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </span>
        </div>
        <div class="version-history-list" id="version-list">
          <div class="loading-content">
            <div class="spinner spinner-sm"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- 添加协作者弹窗 -->
  <div id="add-collaborator-modal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>添加协作者</h3>
        <button class="modal-close" onclick="closeCollaboratorModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group suggestions-container">
          <label>用户名</label>
          <input type="text" id="collaborator-username" placeholder="输入用户名" class="form-input" autocomplete="off">
          <div id="user-suggestions" class="suggestions-dropdown"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCollaboratorModal()">取消</button>
        <button class="btn btn-primary" onclick="submitAddCollaborator()">添加</button>
      </div>
    </div>
  </div>

  <!-- 删除 Skill 确认弹窗 -->
  <div id="delete-skill-modal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>确认删除</h3>
        <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p class="warning-text">⚠️ 此操作不可恢复！将删除该 Skill 的所有版本和数据。</p>
        <div class="form-group">
          <label>请输入 Skill ID 确认删除：</label>
          <input type="text" id="delete-confirm-input" placeholder="" class="form-input">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button>
        <button class="btn btn-danger" onclick="submitDeleteSkill()">确认删除</button>
      </div>
    </div>
  </div>

  <!-- CDN 库 -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

  <!-- 引入 JS -->
  <script src="/js/app.js"></script>
  <script src="/js/skill.js"></script>
  <script src="/js/collaborators.js"></script>
</body>
</html>
