<!DOCTYPE html>
<html lang="zh" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="setup.title">初始化 - Skill Base</title>
    <!-- 引入 Inter 和 JetBrains Mono 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans:['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        base: {
                            950: '#09090b',
                            900: '#13141a',
                            800: '#27272a',
                            400: '#a1a1aa',
                            200: '#e4e4e7',
                        },
                        neon: {
                            400: '#00FFA3',
                            500: '#00E592',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #09090b;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 64px 64px;
        }
        ::selection {
            background: rgba(0, 255, 163, 0.3);
            color: #fff;
        }
        
        /* 表单错误提示 */
        #setupError { display: none; }
        #setupError.visible { display: block; }
        #setupSuccess { display: none; }
        #setupSuccess.visible { display: block; }

        /* 加载动画 */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 255, 163, 0.3);
            border-radius: 50%;
            border-top-color: #00FFA3;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-devtools-icon {
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }

        /* 隐藏原生输入框自动填充背景 */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #09090b inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* 极简内联语言切换 */
        .lang-switcher--inline {
            position: absolute;
            top: 16px;
            right: 16px;
        }
        .lang-switcher-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background-color: #13141a;
            border: 1px solid #27272a;
            border-radius: 0.5rem;
            padding: 0.25rem;
            z-index: 50;
        }
        .lang-switcher.active .lang-switcher-menu {
            display: block;
        }
    </style>
</head>
<body class="text-base-200 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-neon-400/30 selection:text-white">

    <div class="w-full max-w-md relative">

        <!-- 语言切换器 -->
        <div class="lang-switcher lang-switcher--inline z-50">
            <button class="lang-switcher-trigger flex items-center gap-1.5 px-3 py-1.5 text-xs font-mono border border-base-800 rounded-md hover:border-neon-500 hover:text-neon-400 transition-colors bg-base-950/50 backdrop-blur" onclick="toggleLangSwitcher()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
                <span id="currentLang">中文</span>
                <svg class="lang-chevron w-3 h-3 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
            <div class="lang-switcher-menu">
                <button class="lang-switcher-option flex items-center w-full px-3 py-2 text-xs font-mono text-base-400 hover:text-white hover:bg-base-800 rounded-md transition-colors" onclick="setLang('zh')">中文</button>
                <button class="lang-switcher-option flex items-center w-full px-3 py-2 text-xs font-mono text-base-400 hover:text-white hover:bg-base-800 rounded-md transition-colors" onclick="setLang('en')">English</button>
            </div>
        </div>

        <!-- Logo -->
        <div class="flex items-center justify-center gap-2 text-2xl tracking-tight select-none mb-8">
            <span class="text-neon-400 drop-shadow-[0_0_8px_rgba(0,255,163,0.4)]">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            </span>
            <span class="text-white font-bold font-mono">Skill Base</span>
        </div>

        <!-- 卡片 -->
        <div class="bg-base-900 border border-base-800 rounded-xl p-8 shadow-2xl shadow-black/50 relative overflow-hidden">
            <!-- 装饰性代码角标 -->
            <div class="absolute top-0 right-0 bg-base-800 text-base-400 text-[10px] font-mono px-2 py-1 rounded-bl-lg opacity-50 select-none">INIT-SYS</div>

            <div class="mb-8">
                <h1 class="text-2xl font-bold text-white mb-2 flex items-center gap-3">
                    <span class="text-neon-400 font-mono font-normal opacity-70">></span>
                    Setup
                </h1>
                <p class="text-base-400 text-sm font-mono" data-i18n="setup.subtitle">
                    // 首次启动 · 请设置管理员账号
                </p>
            </div>

            <!-- 错误/成功信息 -->
            <div id="setupError" class="mb-6 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm font-mono break-words" role="alert"></div>
            <div id="setupSuccess" class="mb-6 p-3 bg-neon-500/10 border border-neon-500/30 rounded-lg text-neon-400 text-sm font-mono break-words" role="status"></div>

            <form id="setupForm" class="space-y-6">
                <!-- Username -->
                <div class="space-y-2">
                    <label for="username" class="block text-sm font-mono text-base-400">
                        <span class="text-neon-400 opacity-70">let</span> <span class="text-white">admin_username</span> <span class="text-neon-400 opacity-70">=</span>
                    </label>
                    <div class="relative">
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="&quot;admin&quot;"
                            autocomplete="username"
                            required
                            minlength="3"
                            maxlength="50"
                            class="w-full bg-base-950 border border-base-800 text-white font-mono text-sm rounded-lg px-4 py-3 focus:outline-none focus:border-neon-500 focus:ring-1 focus:ring-neon-500 transition-colors placeholder:text-base-400/50"
                        >
                    </div>
                    <p class="text-xs text-base-400/50 font-mono mt-1" data-i18n="setup.usernameHint">// 3-50 个字符</p>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <label for="password" class="block text-sm font-mono text-base-400">
                        <span class="text-neon-400 opacity-70">let</span> <span class="text-white">password</span> <span class="text-neon-400 opacity-70">=</span>
                    </label>
                    <div class="relative">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            autocomplete="new-password"
                            required
                            minlength="6"
                            class="w-full bg-base-950 border border-base-800 text-white font-mono text-sm rounded-lg px-4 py-3 focus:outline-none focus:border-neon-500 focus:ring-1 focus:ring-neon-500 transition-colors placeholder:text-base-400/50"
                        >
                    </div>
                    <p class="text-xs text-base-400/50 font-mono mt-1" data-i18n="setup.passwordHint">// 至少 6 个字符</p>
                </div>

                <!-- Confirm Password -->
                <div class="space-y-2">
                    <label for="confirmPassword" class="block text-sm font-mono text-base-400">
                        <span class="text-neon-400 opacity-70">let</span> <span class="text-white">confirm_password</span> <span class="text-neon-400 opacity-70">=</span>
                    </label>
                    <div class="relative">
                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            placeholder="••••••••"
                            autocomplete="new-password"
                            required
                            minlength="6"
                            class="w-full bg-base-950 border border-base-800 text-white font-mono text-sm rounded-lg px-4 py-3 focus:outline-none focus:border-neon-500 focus:ring-1 focus:ring-neon-500 transition-colors placeholder:text-base-400/50"
                        >
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-2">
                    <button type="submit" id="setupButton" class="w-full flex items-center justify-center bg-transparent border border-neon-500 text-neon-400 hover:bg-[rgba(0,255,163,0.1)] text-sm font-mono px-5 py-3 rounded-lg transition-colors shadow-[0_0_15px_rgba(0,255,163,0.1)] hover:shadow-[0_0_20px_rgba(0,255,163,0.2)]">
                        <svg class="btn-devtools-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        <span data-i18n="setup.submit">创建管理员账号</span>
                    </button>
                </div>
            </form>
        </div>
        
        <!-- 底部提示 -->
        <div class="mt-8 text-center text-xs text-base-400 font-mono flex items-center justify-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-neon-400 animate-pulse"></span>
            <span class="opacity-50">System Initialization</span>
        </div>
    </div>
    
    <!-- 引入 JS -->
    <script src="/js/i18n.js"></script>
    <script src="/js/setup.js"></script>
    <script>
        // 初始化语言切换器状态
        document.addEventListener('DOMContentLoaded', function() {
            const currentLang = localStorage.getItem('skill_base_lang') || 'zh';
            updateLangDisplay(currentLang);
        });

        function toggleLangSwitcher() {
            const switcher = document.querySelector('.lang-switcher');
            switcher.classList.toggle('active');
            const chevron = switcher.querySelector('.lang-chevron');
            if (switcher.classList.contains('active')) {
                chevron.style.transform = 'rotate(180deg)';
            } else {
                chevron.style.transform = 'rotate(0deg)';
            }
        }

        function setLang(lang) {
            localStorage.setItem('skill_base_lang', lang);
            updateLangDisplay(lang);
            
            const switcher = document.querySelector('.lang-switcher');
            switcher.classList.remove('active');
            switcher.querySelector('.lang-chevron').style.transform = 'rotate(0deg)';
            
            // 重新应用翻译
            if (window.applyI18n) {
                window.applyI18n();
            }
        }

        function updateLangDisplay(lang) {
            const display = document.getElementById('currentLang');
            if (display) {
                display.textContent = lang === 'zh' ? '中文' : 'English';
            }
            
            document.querySelectorAll('.lang-switcher-option').forEach(btn => {
                btn.classList.remove('text-neon-400', 'font-bold');
                if (btn.textContent === (lang === 'zh' ? '中文' : 'English')) {
                    btn.classList.add('text-neon-400', 'font-bold');
                }
            });
        }

        document.addEventListener('click', function(e) {
            const switcher = document.querySelector('.lang-switcher');
            if (switcher && !switcher.contains(e.target)) {
                switcher.classList.remove('active');
                switcher.querySelector('.lang-chevron').style.transform = 'rotate(0deg)';
            }
        });
    </script>
</body>
</html>
