<!DOCTYPE html>
<html lang="zh" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="diff.title">版本对比 - Skill Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans:['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        base: { 950: '#09090b', 900: '#13141a', 800: '#27272a', 400: '#a1a1aa', 200: '#e4e4e7' },
                        neon: { 400: '#00FFA3', 500: '#00E592' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3.4.47/bundles/css/diff2html.min.css">
    <style>
        body {
            background-color: #09090b;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 64px 64px;
        }
        ::selection { background: rgba(0, 255, 163, 0.3); color: #fff; }
        
        body.app-devtools .page-content { padding-top: 2rem; min-height: calc(100vh - 64px); }
        .navbar { background-color: rgba(9, 9, 11, 0.8) !important; backdrop-filter: blur(12px); border-bottom: 1px solid #27272a !important; }

        /* 兼容 app.js 的组件样式 */
        .navbar-user-btn { color: #fff !important; border-color: #27272a !important; font-family: 'JetBrains Mono', monospace;}
        .navbar-user-btn:hover { border-color: #00E592 !important; color: #00FFA3 !important; background-color: rgba(0,255,163,0.05) !important; }
        .navbar-user-menu { background-color: #13141a !important; border-color: #27272a !important; }
        .navbar-user-menu-item { color: #e4e4e7 !important; }
        .navbar-user-menu-item:hover { background-color: #27272a !important; color: #00FFA3 !important; }
        .lang-switcher-trigger { border-color: #27272a !important; font-family: 'JetBrains Mono', monospace; }
        .lang-switcher-trigger:hover, .lang-switcher.active .lang-switcher-trigger { border-color: #00E592 !important; color: #00FFA3 !important; }
        .lang-switcher-menu { background-color: #13141a !important; border-color: #27272a !important; }
        .lang-switcher-option:hover { background-color: #27272a !important; }
        .lang-switcher-option.active { color: #00FFA3 !important; background-color: rgba(0,255,163,0.05) !important; }

        .btn-primary { background-color: transparent !important; border: 1px solid #00E592 !important; color: #00FFA3 !important; box-shadow: 0 0 15px rgba(0,255,163,0.1) !important; font-family: 'JetBrains Mono', monospace; }
        .btn-primary:hover { background-color: rgba(0,255,163,0.1) !important; box-shadow: 0 0 20px rgba(0,255,163,0.2) !important; color: #00FFA3 !important;}
        .btn-secondary { background-color: transparent !important; border: 1px solid #27272a !important; color: #e4e4e7 !important; font-family: 'JetBrains Mono', monospace; }
        .btn-secondary:hover { background-color: #27272a !important; color: #fff !important; }

        /* Diff specific */
        .diff-controls { background-color: #13141a !important; border: 1px solid #27272a !important; border-radius: 0.75rem !important; box-shadow: none !important; padding: 1.5rem !important; }
        .diff-control-label { font-family: 'JetBrains Mono', monospace; color: #a1a1aa !important; }
        select { font-family: 'JetBrains Mono', monospace !important; background-color: #09090b !important; border: 1px solid #27272a !important; color: #fff !important; padding: 0.5rem 1rem; border-radius: 0.5rem; outline: none; }
        select:focus { border-color: #00FFA3 !important; }
        .diff-arrow { color: #27272a !important; }
        
        .btn-group { border-radius: 0.5rem !important; border-color: #27272a !important; }
        .btn-group .btn { border-color: #27272a !important; }
        .btn-group .btn.active { background-color: rgba(0,255,163,0.1) !important; border-color: #00E592 !important; color: #00FFA3 !important; }
        
        .diff-stats { background-color: #09090b !important; border: 1px solid #27272a !important; border-radius: 0.5rem !important; font-family: 'JetBrains Mono', monospace; }
        .diff-file-path { background-color: #09090b !important; border: 1px solid #27272a !important; color: #00FFA3 !important; }

        .changed-files { background-color: #13141a !important; border: 1px solid #27272a !important; border-radius: 0.75rem !important; box-shadow: none !important; }
        .changed-files-header { border-bottom: 1px solid #27272a !important; color: #fff !important; font-family: 'JetBrains Mono', monospace; }
        .changed-file-item { border-bottom: 1px solid #27272a !important; padding: 0.75rem 1rem !important; }
        .changed-file-item:hover { background-color: #09090b !important; }
        .changed-file-item.active { background-color: rgba(0,255,163,0.05) !important; }
        .changed-file-path { color: #a1a1aa !important; font-family: 'JetBrains Mono', monospace; }
        
        .changed-file-status.added { background-color: rgba(34,197,94,0.1) !important; color: #4ade80 !important; }
        .changed-file-status.deleted { background-color: rgba(248,113,113,0.1) !important; color: #f87171 !important; }
        .changed-file-status.modified { background-color: rgba(251,146,60,0.1) !important; color: #fb923c !important; }

        .diff-output-container { background-color: #131419 !important; border: 1px solid #27272a !important; border-radius: 0.75rem !important; box-shadow: none !important; overflow: hidden; }
        
        /* diff2html 深色主题覆盖 */
        .d2h-wrapper { background-color: #131419 !important; }
        .d2h-file-wrapper { background-color: #131419 !important; border: none !important; }
        .d2h-file-header { background-color: #09090b !important; border-bottom: 1px solid #27272a !important; }
        .d2h-file-name-wrapper { background-color: transparent !important; }
        .d2h-file-name { color: #00FFA3 !important; font-family: 'JetBrains Mono', monospace !important; }
        .d2h-tag { background-color: rgba(0,255,163,0.1) !important; color: #00FFA3 !important; border: 1px solid #00E592 !important; }
        .d2h-code-wrapper, .d2h-diff-table { background-color: #131419 !important; }
        .d2h-code-line, .d2h-code-side-line { background-color: #131419 !important; color: #e4e4e7 !important; }
        .d2h-code-line-ctn { color: #e4e4e7 !important; font-family: 'JetBrains Mono', monospace !important; }
        .d2h-code-line-prefix { color: #a1a1aa !important; }
        .d2h-ins { background-color: rgba(34,197,94,0.15) !important; }
        .d2h-ins .d2h-code-line-ctn { background-color: transparent !important; }
        .d2h-del { background-color: rgba(248,113,113,0.15) !important; }
        .d2h-del .d2h-code-line-ctn { background-color: transparent !important; }
        .d2h-info { background-color: #09090b !important; color: #a1a1aa !important; border-color: #27272a !important; }
        .d2h-file-diff { border: none !important; }
        .d2h-diff-tbody tr { border-color: #27272a !important; }
        .d2h-code-linenumber, .d2h-code-side-linenumber { background-color: #1a1b23 !important; color: #9ca3af !important; border-color: #27272a !important; }
        .d2h-cntx { background-color: #131419 !important; }
        .d2h-file-collapse { background-color: #09090b !important; border-color: #27272a !important; }
        .d2h-file-collapse-input:checked + .d2h-file-collapse-label { background-color: rgba(0,255,163,0.1) !important; }
        
        .empty-state { font-family: 'JetBrains Mono', monospace; color: #64748b; }
    </style>
</head>
<body class="text-base-200 font-sans min-h-screen pb-16 selection:bg-neon-400/30 selection:text-white">
    <!-- 导航栏 -->
    <nav class="navbar sticky top-0 z-50 bg-base-950/80 backdrop-blur-md border-b border-base-800">
        <div class="container max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
            <div class="flex items-center gap-8">
                <a href="/" class="flex items-center gap-2 text-lg tracking-tight select-none cursor-pointer">
                    <div class="text-neon-400 drop-shadow-[0_0_8px_rgba(0,255,163,0.4)]">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                    </div>
                    <span class="font-mono text-neon-400 font-bold drop-shadow-[0_0_8px_rgba(0,255,163,0.4)]">Skill</span>
                    <span class="text-white font-bold">Base</span>
                </a>
                <div class="hidden md:flex items-baseline space-x-6 text-sm font-medium">
                    <a href="/" class="text-base-400 hover:text-white font-mono transition-colors flex items-center gap-1.5" data-i18n="nav.home"><span class="text-neon-400">./</span>Home</a>
                    <a href="/publish.html" class="text-base-400 hover:text-white font-mono transition-colors flex items-center gap-1.5" data-i18n="nav.publish">Publish</a>
                </div>
            </div>
            <!-- app.js 将在这里注入 .navbar-user -->
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8">
            
            <!-- 面包屑 -->
            <div class="text-sm text-base-400 font-mono mb-6 flex items-center flex-wrap gap-2">
                <span class="text-neon-400">~</span>
                <span class="opacity-50">/</span>
                <a href="/" class="hover:text-white transition-colors">home</a>
                <span class="opacity-50">/</span>
                <a href="#" id="breadcrumb-skill" class="hover:text-white transition-colors" data-i18n="state.loading">加载中...</a>
                <span class="opacity-50">/</span>
                <span class="text-white">diff</span>
            </div>

            <!-- 控制区 -->
            <div class="diff-controls relative">
                <div class="absolute top-0 right-0 bg-base-800 text-base-400 text-[10px] font-mono px-2 py-1 rounded-bl-lg opacity-50 select-none">GIT-DIFF</div>
                
                <div class="diff-controls-row flex flex-wrap items-center gap-4">
                    <div class="diff-control-group flex items-center gap-2">
                        <span class="diff-control-label text-xs" data-i18n="diff.versionA">Old:</span>
                        <select id="version-a" onchange="onVersionChange()" class="text-xs py-2 w-52"></select>
                    </div>
                    <span class="diff-arrow font-mono text-base-800">-></span>
                    <div class="diff-control-group flex items-center gap-2">
                        <span class="diff-control-label text-xs" data-i18n="diff.versionB">New:</span>
                        <select id="version-b" onchange="onVersionChange()" class="text-xs py-2 w-52"></select>
                    </div>
                    <button class="btn btn-primary btn-sm flex items-center gap-2 ml-2" onclick="performDiff()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                        <span data-i18n="diff.recalculate">Diff</span>
                    </button>
                </div>

                <div class="diff-controls-row flex flex-wrap items-center justify-between mt-6 pt-6 border-t border-base-800 gap-4">
                    <div class="flex items-center gap-3 w-full sm:w-auto">
                        <span class="diff-control-label text-xs" data-i18n="diff.file">File:</span>
                        <span id="current-file-path" class="diff-file-path text-xs px-2 py-1 rounded" data-i18n="diff.allFiles">All Files</span>
                    </div>

                    <div class="btn-group flex rounded-lg overflow-hidden border border-base-800">
                        <button class="btn btn-secondary active px-4 py-1.5 text-xs font-mono" id="btn-side-by-side" onclick="toggleOutputFormat('side-by-side')" data-i18n="diff.sideBySide">Split</button>
                        <button class="btn btn-secondary px-4 py-1.5 text-xs font-mono border-l border-base-800" id="btn-line-by-line" onclick="toggleOutputFormat('line-by-line')" data-i18n="diff.unified">Unified</button>
                    </div>
                </div>
            </div>

            <!-- 统计信息 -->
            <div class="diff-stats flex items-center gap-6 py-3 px-4 mb-6 text-xs mt-6" id="diff-stats" style="display: none;">
                <span class="text-green-400 font-mono" id="stats-added">+0</span>
                <span class="text-red-400 font-mono" id="stats-removed">-0</span>
                <span class="text-base-400 font-mono" id="stats-files">0 files</span>
            </div>

            <!-- 文件列表 -->
            <div class="changed-files mb-6" id="changed-files" style="display: none;">
                <div class="changed-files-header px-4 py-3 bg-base-950/50 rounded-t-xl flex items-center gap-2 text-xs">
                    <span class="text-neon-400">ls</span> <span class="opacity-50">--changed</span>
                </div>
                <div class="changed-files-list max-h-64 overflow-y-auto no-scrollbar" id="changed-files-list">
                    <!-- JS Rendering -->
                </div>
            </div>

            <!-- 差异展示区 -->
            <div class="diff-output-container bg-base-900 border border-base-800 rounded-xl overflow-hidden min-h-[300px]" id="diff-output-container">
                <div id="diff-output" class="h-full">
                    <div class="empty-state flex flex-col items-center justify-center py-24 opacity-50">
                        <div class="font-mono text-4xl mb-4">_</div>
                        <p class="text-xs" data-i18n="diff.empty">Select versions to compare</p>
                    </div>
                </div>
            </div>
    
            <!-- 底部返回 -->
            <div class="mt-8 pb-16">
                <button class="btn btn-secondary btn-sm flex items-center gap-2" onclick="goToSkillDetail()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    <span data-i18n="diff.back">Back to details</span>
                </button>
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff@5.1.0/dist/diff.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.47/bundles/js/diff2html-ui.min.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/diff.js"></script>
</body>
</html>
