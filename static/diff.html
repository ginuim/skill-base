<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>版本对比 - Skill Base</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- diff2html 样式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3.4.47/bundles/css/diff2html.min.css">
  <style>
    /* 面包屑导航 */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: var(--spacing-lg);
    }

    .breadcrumb a {
      color: var(--text-secondary);
    }

    .breadcrumb a:hover {
      color: var(--primary-color);
    }

    .breadcrumb-separator {
      color: var(--text-muted);
    }

    .breadcrumb-current {
      color: var(--text-color);
      font-weight: 500;
    }

    /* 顶部控制栏 */
    .diff-controls {
      background-color: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .diff-controls-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      flex-wrap: wrap;
    }

    .diff-controls-row + .diff-controls-row {
      margin-top: var(--spacing-md);
    }

    .diff-control-group {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .diff-control-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-weight: 500;
      white-space: nowrap;
    }

    .diff-control-group select {
      min-width: 150px;
    }

    .diff-arrow {
      font-size: 1.25rem;
      color: var(--text-muted);
    }

    /* 视图切换按钮组 */
    .btn-group {
      display: flex;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .btn-group .btn {
      border: none;
      border-radius: 0;
      border-right: 1px solid var(--border-color);
    }

    .btn-group .btn:last-child {
      border-right: none;
    }

    .btn-group .btn.active {
      background-color: var(--primary-color);
      color: var(--white);
    }

    /* 文件路径显示 */
    .diff-file-path {
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 0.875rem;
      color: var(--text-secondary);
      background-color: var(--bg-color);
      padding: var(--spacing-xs) var(--spacing-sm);
      border-radius: var(--radius-sm);
      word-break: break-all;
    }

    /* Diff 统计信息 */
    .diff-stats {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md) var(--spacing-lg);
      background-color: var(--bg-color);
      border-radius: var(--radius);
      margin-bottom: var(--spacing-lg);
      font-size: 0.875rem;
    }

    .diff-stats-added {
      color: var(--success-color);
      font-weight: 500;
    }

    .diff-stats-removed {
      color: var(--error-color);
      font-weight: 500;
    }

    .diff-stats-files {
      color: var(--text-secondary);
    }

    /* Diff 渲染区域 */
    .diff-output-container {
      background-color: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: var(--spacing-lg);
    }

    .diff-output-header {
      padding: var(--spacing-md) var(--spacing-lg);
      border-bottom: 1px solid var(--border-color);
      background-color: var(--bg-color);
      font-weight: 500;
    }

    #diff-output {
      overflow-x: auto;
    }

    /* diff2html 样式覆盖 */
    .d2h-wrapper {
      border: none !important;
    }

    .d2h-file-wrapper {
      border: none !important;
      border-radius: 0 !important;
      margin-bottom: 0 !important;
    }

    .d2h-file-header {
      background-color: var(--bg-color) !important;
      border-bottom: 1px solid var(--border-color) !important;
    }

    /* 变更文件列表 */
    .changed-files {
      background-color: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: var(--spacing-lg);
    }

    .changed-files-header {
      padding: var(--spacing-md) var(--spacing-lg);
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      color: var(--text-color);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .changed-files-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .changed-file-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-sm) var(--spacing-lg);
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      transition: var(--transition);
    }

    .changed-file-item:last-child {
      border-bottom: none;
    }

    .changed-file-item:hover {
      background-color: var(--bg-color);
    }

    .changed-file-item.active {
      background-color: var(--primary-light);
    }

    .changed-file-status {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-sm);
    }

    .changed-file-status.added {
      background-color: var(--success-light);
      color: var(--success-color);
    }

    .changed-file-status.deleted {
      background-color: var(--error-light);
      color: var(--error-color);
    }

    .changed-file-status.modified {
      background-color: var(--warning-light);
      color: var(--warning-color);
    }

    .changed-file-path {
      flex: 1;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 0.8125rem;
      color: var(--text-color);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: var(--spacing-xl);
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: var(--spacing-md);
      opacity: 0.5;
    }

    /* Loading */
    .loading-content {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }

    .loading-overlay {
      position: relative;
    }

    .loading-overlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.8);
      z-index: 10;
    }

    .loading-overlay::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
      border: 3px solid var(--border-color);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      z-index: 11;
    }

    /* 二进制文件提示 */
    .binary-diff-notice {
      text-align: center;
      padding: var(--spacing-xl);
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .diff-controls-row {
        flex-direction: column;
        align-items: stretch;
      }

      .diff-control-group {
        width: 100%;
      }

      .diff-control-group select {
        flex: 1;
      }

      .diff-arrow {
        transform: rotate(90deg);
        align-self: center;
      }

      .btn-group {
        width: 100%;
      }

      .btn-group .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body class="app-devtools">
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">
        <svg class="navbar-brand-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span>Skill Base</span>
      </a>
      <div class="navbar-nav">
        <a href="/">首页</a>
        <a href="/publish.html" class="hide-mobile">发布</a>
      </div>
    </div>
  </nav>

  <!-- 页面内容 -->
  <main class="page-content">
    <div class="container">
      <!-- 面包屑导航 -->
      <nav class="breadcrumb">
        <a href="/">首页</a>
        <span class="breadcrumb-separator">›</span>
        <a href="#" id="breadcrumb-skill">加载中...</a>
        <span class="breadcrumb-separator">›</span>
        <span class="breadcrumb-current">版本对比</span>
      </nav>

      <!-- 顶部控制栏 -->
      <div class="diff-controls">
        <div class="diff-controls-row">
          <div class="diff-control-group">
            <span class="diff-control-label">版本 A (旧):</span>
            <select id="version-a" onchange="onVersionChange()">
              <option value="">选择版本...</option>
            </select>
          </div>

          <span class="diff-arrow">→</span>

          <div class="diff-control-group">
            <span class="diff-control-label">版本 B (新):</span>
            <select id="version-b" onchange="onVersionChange()">
              <option value="">选择版本...</option>
            </select>
          </div>

          <button class="btn btn-primary" onclick="performDiff()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            重新计算
          </button>
        </div>

        <div class="diff-controls-row">
          <div class="diff-control-group">
            <span class="diff-control-label">文件:</span>
            <span id="current-file-path" class="diff-file-path">全部文件</span>
          </div>

          <div class="btn-group" style="margin-left: auto;">
            <button class="btn btn-secondary active" id="btn-side-by-side" onclick="toggleOutputFormat('side-by-side')">
              左右对比
            </button>
            <button class="btn btn-secondary" id="btn-line-by-line" onclick="toggleOutputFormat('line-by-line')">
              统一视图
            </button>
          </div>
        </div>
      </div>

      <!-- Diff 统计信息 -->
      <div class="diff-stats" id="diff-stats" style="display: none;">
        <span class="diff-stats-added" id="stats-added">+0 行</span>
        <span class="diff-stats-removed" id="stats-removed">-0 行</span>
        <span class="diff-stats-files" id="stats-files">0 个文件变更</span>
      </div>

      <!-- 变更文件列表（整体对比时显示） -->
      <div class="changed-files" id="changed-files" style="display: none;">
        <div class="changed-files-header">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          变更文件列表
        </div>
        <div class="changed-files-list" id="changed-files-list">
          <!-- 动态渲染 -->
        </div>
      </div>

      <!-- Diff 渲染区域 -->
      <div class="diff-output-container" id="diff-output-container">
        <div id="diff-output">
          <div class="empty-state">
            <div class="empty-state-icon">📊</div>
            <p>选择两个版本后点击"重新计算"查看差异</p>
          </div>
        </div>
      </div>

      <!-- 底部操作栏 -->
      <div style="display: flex; gap: var(--spacing-md); flex-wrap: wrap;">
        <button class="btn btn-secondary" onclick="goToSkillDetail()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          返回详情页
        </button>
      </div>
    </div>
  </main>

  <!-- CDN 库 -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/diff@5.1.0/dist/diff.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.47/bundles/js/diff2html-ui.min.js"></script>

  <!-- 引入 JS -->
  <script src="/js/app.js"></script>
  <script src="/js/diff.js"></script>
</body>
</html>
