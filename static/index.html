<!DOCTYPE html>
<html lang="zh" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Base</title>
    <!-- 引入 Inter 和 JetBrains Mono 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans:['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        base: { 950: '#09090b', 900: '#13141a', 800: '#27272a', 400: '#a1a1aa', 200: '#e4e4e7' },
                        neon: { 400: '#00FFA3', 500: '#00E592' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background-color: #09090b;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 64px 64px;
        }
        ::selection { background: rgba(0, 255, 163, 0.3); color: #fff; }
        
        .navbar { background-color: rgba(9, 9, 11, 0.8) !important; backdrop-filter: blur(12px); border-bottom: 1px solid #27272a !important; }

        /* 兼容 app.js：语言/用户按钮表面样式见 style.css html.dark … button.navbar-surface-btn */
        
        .btn-primary { background-color: transparent !important; border: 1px solid #00E592 !important; color: #00FFA3 !important; box-shadow: 0 0 15px rgba(0,255,163,0.1) !important; }
        .btn-primary:hover { background-color: rgba(0,255,163,0.1) !important; box-shadow: 0 0 20px rgba(0,255,163,0.2) !important; }

        /* 搜索框 */
        .search-bar { position: relative; width: 100%; max-width: 600px; margin: 0 auto; }
        .search-bar input {
            width: 100%; background-color: #13141a !important; border: 1px solid #27272a !important;
            color: #fff !important; font-family: 'JetBrains Mono', monospace !important; font-size: 0.875rem !important;
            border-radius: 0.5rem !important; padding: 0.75rem 2.5rem 0.75rem 5rem !important;
            transition: all 0.2s ease !important;
        }
        .search-bar input:focus {
            border-color: #00FFA3 !important; box-shadow: 0 0 0 1px #00FFA3 !important; outline: none !important;
        }
        .search-bar input::placeholder { color: #64748b !important; }
        .search-icon-wrapper {
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            color: #00FFA3; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; pointer-events: none;
            display: flex; items-center; gap: 0.5rem;
        }
        .search-bar .clear-btn {
            position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
            color: #64748b; cursor: pointer; padding: 0.25rem; display: none; background: none; border: none;
        }
        .search-bar .clear-btn:hover { color: #fff; }
        .search-bar input:not(:placeholder-shown) ~ .clear-btn { display: block; }

        /* Skill Grid */
        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .skill-card {
            background-color: #13141a !important;
            border: 1px solid #27272a !important;
            border-radius: 0.75rem !important;
            padding: 1.5rem !important;
            transition: all 0.2s ease !important;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: none !important;
            text-decoration: none !important;
        }

        .skill-card:hover {
            border-color: rgba(0,255,163,0.5) !important;
            box-shadow: 0 0 20px rgba(0,255,163,0.05) !important;
            transform: translateY(-2px) !important;
        }

        .skill-card-header {
            display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.75rem;
        }
        .skill-card-name {
            font-family: 'JetBrains Mono', monospace; font-size: 1.125rem; font-weight: 600; color: #fff; margin: 0;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .skill-card-name::before { content: '>'; color: #00FFA3; opacity: 0.7; font-weight: 400; }
        
        .skill-card-desc {
            font-size: 0.875rem; color: #a1a1aa; line-height: 1.6; margin-bottom: 1.5rem; flex: 1;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .skill-card-footer {
            display: flex; align-items: center; justify-content: space-between; font-size: 0.75rem; color: #64748b;
            padding-top: 1rem; border-top: 1px solid #27272a; font-family: 'JetBrains Mono', monospace;
        }
        .skill-card-meta { display: flex; align-items: center; gap: 1rem; }
        .skill-card-owner { display: flex; align-items: center; gap: 0.25rem; }

        /* FAB */
        .fab {
            position: fixed; bottom: 2rem; right: 2rem; width: 56px; height: 56px; border-radius: 50%;
            background-color: transparent !important; border: 1px solid #00E592 !important;
            color: #00FFA3 !important; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0,255,163,0.1) !important; transition: all 0.2s ease; z-index: 100;
        }
        .fab:hover {
            background-color: rgba(0,255,163,0.1) !important; box-shadow: 0 0 25px rgba(0,255,163,0.3) !important;
            transform: scale(1.05); color: #fff !important; border-color: #00FFA3 !important;
        }

        /* 骨架屏覆盖 */
        .skeleton-card {
            background-color: #13141a !important; border: 1px solid #27272a !important; padding: 1.5rem !important; border-radius: 0.75rem !important;
        }
        .skeleton-title, .skeleton-desc, .skeleton-desc-short, .skeleton-footer {
            background: linear-gradient(90deg, #13141a 25%, #27272a 50%, #13141a 75%) !important;
            background-size: 200% 100% !important; animation: skeleton-loading 1.5s infinite !important; border-radius: 4px;
        }
        .empty-state { padding: 4rem 1rem; text-align: center; color: #64748b; font-family: 'JetBrains Mono', monospace; }
        .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; color: #00FFA3; }
    </style>
</head>
<body class="text-base-200 font-sans min-h-screen pb-16 selection:bg-neon-400/30 selection:text-white">
    <!-- 导航栏 -->
    <skill-base-nav
        current-path="/"
        items='[{"href":"/","label":"Home","i18n":"nav.home"},{"href":"/publish.html","label":"Publish","i18n":"nav.publish"}]'>
    </skill-base-nav>

    <!-- 页面内容 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8">
            
            <!-- 页面标题区域 -->
            <div class="page-header mb-8 text-center">
                <div class="inline-flex items-center justify-center gap-2 px-3 py-1 bg-base-900 border border-base-800 rounded-full mb-6 text-xs font-mono text-neon-400">
                    <span class="w-2 h-2 rounded-full bg-neon-400 animate-pulse"></span>
                    Skill Directory
                </div>
                
                <div class="search-bar">
                    <div class="search-icon-wrapper">
                        <span>$</span>
                        <span>grep</span>
                    </div>
                    <input 
                        type="search" 
                        id="searchInput" 
                        data-i18n-placeholder="index.searchPlaceholder"
                        placeholder="&quot;search skill...&quot;"
                        autocomplete="off"
                    >
                    <button type="button" class="clear-btn" id="clearSearch">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 面包屑 (终端路径风格) -->
            <div class="text-sm text-base-400 font-mono mb-6 flex items-center gap-2">
                <span class="text-neon-400">~</span>
                <span class="opacity-50">/</span>
                <span class="text-white">skills</span>
                <span class="opacity-50 ml-2">ls -la</span>
            </div>

            <!-- Skill 列表 -->
            <div id="skill-list" class="skill-grid pb-16">
                <!-- 由 JS 动态渲染 -->
            </div>
    </main>

    <!-- 浮动发布按钮 -->
    <a href="/publish.html" class="fab" data-i18n-title="index.fabTitle" title="发布新版本">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
    </a>

    <!-- 引入 JS -->
    <script src="/js/i18n.js"></script>
    <script src="/js/components/skill-base-nav.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/index.js"></script>
</body>
</html>
