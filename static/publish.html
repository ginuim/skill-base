<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布新版本 - Skill Base</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    /* 面包屑导航 */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .breadcrumb a {
      color: var(--text-secondary);
    }

    .breadcrumb a:hover {
      color: var(--primary-color);
    }

    .breadcrumb-separator {
      color: var(--text-muted);
    }

    .breadcrumb-current {
      color: var(--text-color);
      font-weight: 500;
    }

    /* 发布表单卡片 */
    .publish-card {
      max-width: 720px;
      margin: 0 auto;
    }

    .publish-card .card-title {
      font-size: 1.25rem;
      margin-bottom: var(--spacing-lg);
    }

    /* Skill 选择区域 */
    .skill-select-group {
      display: flex;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }

    .skill-select-group select {
      flex: 1;
    }

    /* 新建字段组 */
    .new-skill-fields {
      transition: var(--transition);
    }

    .new-skill-fields.hidden {
      display: none;
    }

    /* 拖拽上传区域增强 */
    .drop-zone {
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .drop-zone.drag-over {
      border-color: var(--primary-color);
      background-color: var(--primary-light);
    }

    .drop-zone-subtitle {
      font-size: 0.875rem;
      color: var(--primary-color);
      cursor: pointer;
      margin-top: var(--spacing-xs);
    }

    .drop-zone-subtitle:hover {
      text-decoration: underline;
    }

    /* 分隔线 */
    .divider {
      display: flex;
      align-items: center;
      margin: var(--spacing-lg) 0;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background-color: var(--border-color);
    }

    .divider span {
      padding: 0 var(--spacing-md);
    }

    /* zip 文件选择按钮 */
    .zip-select-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .zip-file-input {
      display: none;
    }

    /* 文件预览区域 */
    .file-preview {
      margin-top: var(--spacing-md);
      padding: var(--spacing-md);
      background-color: var(--bg-color);
      border-radius: var(--radius);
      display: none;
    }

    .file-preview.visible {
      display: block;
    }

    .file-preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-sm);
      font-weight: 500;
      color: var(--text-color);
    }

    .file-preview-clear {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: var(--spacing-xs);
      font-size: 0.75rem;
    }

    .file-preview-clear:hover {
      color: var(--error-color);
    }

    .file-preview-list {
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 0.75rem;
      color: var(--text-secondary);
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.6;
    }

    .file-preview-list .file-item {
      padding: var(--spacing-xs) 0;
      border-bottom: 1px solid var(--border-color);
    }

    .file-preview-list .file-item:last-child {
      border-bottom: none;
    }

    .file-preview-more {
      color: var(--text-muted);
      font-style: italic;
      padding-top: var(--spacing-sm);
    }

    .file-preview-summary {
      margin-top: var(--spacing-sm);
      padding-top: var(--spacing-sm);
      border-top: 1px solid var(--border-color);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* 按钮栏 */
    .form-actions {
      display: flex;
      gap: var(--spacing-md);
      justify-content: flex-end;
      margin-top: var(--spacing-xl);
      padding-top: var(--spacing-lg);
      border-top: 1px solid var(--border-color);
    }

    /* 进度条 */
    .progress-container {
      margin-top: var(--spacing-lg);
      display: none;
    }

    .progress-container.visible {
      display: block;
    }

    .progress-bar-wrapper {
      height: 8px;
      background-color: var(--bg-color);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background-color: var(--primary-color);
      border-radius: var(--radius-full);
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      margin-top: var(--spacing-sm);
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-align: center;
    }

    /* 成功提示 */
    .success-container {
      margin-top: var(--spacing-lg);
      padding: var(--spacing-lg);
      background-color: var(--success-light);
      border-radius: var(--radius);
      text-align: center;
      display: none;
    }

    .success-container.visible {
      display: block;
    }

    .success-icon {
      font-size: 3rem;
      margin-bottom: var(--spacing-md);
    }

    .success-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--success-color);
      margin-bottom: var(--spacing-sm);
    }

    .success-message {
      color: var(--text-secondary);
      margin-bottom: var(--spacing-md);
    }

    .success-actions {
      display: flex;
      gap: var(--spacing-md);
      justify-content: center;
    }

    @media (max-width: 768px) {
      .skill-select-group {
        flex-direction: column;
      }

      .form-actions {
        flex-direction: column-reverse;
      }

      .form-actions .btn {
        width: 100%;
      }

      .success-actions {
        flex-direction: column;
      }

      .success-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body class="app-devtools">
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">
        <svg class="navbar-brand-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span>Skill Base</span>
      </a>
      <div class="navbar-nav">
        <a href="/">首页</a>
        <a href="/publish.html" class="active hide-mobile">发布</a>
      </div>
      <!-- 用户区域由 JS 动态渲染 -->
    </div>
  </nav>

  <!-- 页面内容 -->
  <main class="page-content">
    <div class="container">
      <!-- 面包屑导航 -->
      <nav class="breadcrumb">
        <a href="/">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">发布新版本</span>
      </nav>

      <!-- 发布表单卡片 -->
      <div class="card publish-card">
        <h1 class="card-title">发布新版本</h1>

        <form id="publishForm">
          <!-- 上传优先：进入页面即可拖文件夹 / zip，并自动填 SKILL.md 信息 -->
          <div class="form-group">
            <label class="form-label required">上传文件</label>
            <div id="drop-zone" class="drop-zone">
              <div class="drop-zone-icon">📁</div>
              <div class="drop-zone-text">拖拽 Skill 文件夹或 zip 到此处</div>
              <div class="drop-zone-subtitle">或点击选择文件夹</div>
              <div class="drop-zone-hint">将读取包内 SKILL.md 填写名称与描述；Skill ID 优先使用文件夹名或 zip 文件名</div>
            </div>

            <div class="divider">
              <span>或</span>
            </div>

            <div>
              <label class="btn btn-secondary zip-select-btn">
                <span>📎</span>
                <span>选择 zip 文件...</span>
                <input type="file" id="zip-file-input" class="zip-file-input" accept=".zip">
              </label>
            </div>

            <div id="file-preview" class="file-preview">
              <div class="file-preview-header">
                <span>已选择文件</span>
                <button type="button" class="file-preview-clear" id="clear-files">清除</button>
              </div>
              <div id="file-preview-list" class="file-preview-list">
                <!-- 由 JS 动态填充 -->
              </div>
              <div id="file-preview-summary" class="file-preview-summary"></div>
            </div>
          </div>

          <!-- Skill 选择 -->
          <div class="form-group">
            <label for="skill-select" class="form-label">选择 Skill</label>
            <div class="skill-select-group">
              <select id="skill-select">
                <option value="">-- 创建新 Skill --</option>
                <!-- 由 JS 动态填充已有 Skill -->
              </select>
            </div>
            <p class="form-hint">选择已有 Skill 进行更新，或创建新的 Skill</p>
          </div>

          <!-- Skill ID（新建时手动输入，更新时自动填充；拖入文件夹/zip 时会尝试从名称填入） -->
          <div class="form-group">
            <label for="skill-id" class="form-label required">Skill ID</label>
            <input 
              type="text" 
              id="skill-id" 
              placeholder="例如：my-awesome-skill（拖入包后可自动填入）"
              pattern="[a-z0-9\-_]+"
            >
            <p class="form-hint">唯一标识符，只能包含小写字母、数字、下划线和连字符；无法从文件夹或 zip 文件名推断时请手动填写</p>
          </div>

          <!-- 新建 Skill 时的额外字段 -->
          <div id="new-skill-fields" class="new-skill-fields">
            <div class="form-group">
              <label for="skill-name" class="form-label required">Skill 名称</label>
              <input 
                type="text" 
                id="skill-name" 
                placeholder="例如：我的技能包"
              >
              <p class="form-hint">显示名称，便于识别</p>
            </div>

            <div class="form-group">
              <label for="skill-description" class="form-label required">描述</label>
              <textarea 
                id="skill-description" 
                rows="3"
                maxlength="500"
                placeholder="从 SKILL.md 的 description 自动填充；Skill 必填，不超过 500 字"
              ></textarea>
              <p class="form-hint"><span id="skill-description-count">0</span> / 500 字</p>
            </div>
          </div>

          <!-- 更新说明 -->
          <div class="form-group">
            <label for="changelog" class="form-label">更新说明</label>
            <textarea 
              id="changelog" 
              rows="4"
              placeholder="描述本次更新的内容...&#10;&#10;例如：&#10;- 新增 xxx 功能&#10;- 修复 xxx 问题"
            ></textarea>
          </div>

          <!-- 按钮栏 -->
          <div class="form-actions">
            <a href="/" class="btn btn-secondary">取消</a>
            <button type="submit" id="submit-btn" class="btn btn-primary">
              发布新版本
            </button>
          </div>

          <!-- 进度条 -->
          <div id="progress-container" class="progress-container">
            <div class="progress-bar-wrapper">
              <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="progress-text" class="progress-text">正在上传...</div>
          </div>
        </form>

        <!-- 成功提示 -->
        <div id="success-container" class="success-container">
          <div class="success-icon">✅</div>
          <div class="success-title">发布成功！</div>
          <div id="success-message" class="success-message"></div>
          <div class="success-actions">
            <a id="view-skill-link" href="#" class="btn btn-primary">查看详情</a>
            <a href="/publish.html" class="btn btn-secondary">继续发布</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 引入 JS -->
  <script src="/js/app.js"></script>
  <script src="/js/publish.js"></script>
</body>
</html>
