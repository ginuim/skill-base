<!DOCTYPE html>
<html lang="zh" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="file.title">文件预览 - Skill Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans:['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        base: { 950: '#09090b', 900: '#13141a', 800: '#27272a', 400: '#a1a1aa', 200: '#e4e4e7' },
                        neon: { 400: '#00FFA3', 500: '#00E592' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <style>
        body {
            background-color: #09090b;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 64px 64px;
        }
        ::selection { background: rgba(0, 255, 163, 0.3); color: #fff; }
        
        body.app-devtools { background-color: transparent; background-image: none; }
        body.app-devtools .page-content { background-image: none; padding-top: 2rem; min-height: calc(100vh - 64px); }
        .navbar { position: sticky; top: 0; background-color: rgba(9, 9, 11, 0.8) !important; backdrop-filter: blur(12px); border-bottom: 1px solid #27272a !important; height: 64px; }
        .navbar .container { height: 100%; }

        /* 兼容 app.js 的组件样式 */
        .navbar-user-btn { color: #fff !important; border-color: #27272a !important; font-family: 'JetBrains Mono', monospace;}
        .navbar-user-btn:hover { border-color: #00E592 !important; color: #00FFA3 !important; background-color: rgba(0,255,163,0.05) !important; }
        .navbar-user-menu { background-color: #13141a !important; border-color: #27272a !important; }
        .navbar-user-menu-item { color: #e4e4e7 !important; }
        .navbar-user-menu-item:hover { background-color: #27272a !important; color: #00FFA3 !important; }
        .lang-switcher-trigger { border-color: #27272a !important; font-family: 'JetBrains Mono', monospace; }
        .lang-switcher-trigger:hover, .lang-switcher.active .lang-switcher-trigger { border-color: #00E592 !important; color: #00FFA3 !important; }
        .lang-switcher-menu { background-color: #13141a !important; border-color: #27272a !important; }
        .lang-switcher-option:hover { background-color: #27272a !important; }
        .lang-switcher-option.active { color: #00FFA3 !important; background-color: rgba(0,255,163,0.05) !important; }

        .btn-primary { background-color: transparent !important; border: 1px solid #00E592 !important; color: #00FFA3 !important; box-shadow: 0 0 15px rgba(0,255,163,0.1) !important; font-family: 'JetBrains Mono', monospace; }
        .btn-primary:hover { background-color: rgba(0,255,163,0.1) !important; box-shadow: 0 0 20px rgba(0,255,163,0.2) !important; color: #00FFA3 !important;}
        .btn-secondary { background-color: transparent !important; border: 1px solid #27272a !important; color: #e4e4e7 !important; font-family: 'JetBrains Mono', monospace; }
        .btn-secondary:hover { background-color: #27272a !important; color: #fff !important; }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* File specific overrides */
        .file-tree-panel { background-color: #13141a !important; border: 1px solid #27272a !important; border-radius: 0.75rem !important; box-shadow: none !important; }
        .file-tree-panel-title { display: none; }
        .file-tree-item { font-family: 'JetBrains Mono', monospace; color: #a1a1aa; padding: 0.375rem 0.5rem; transition: all 0.2s ease; border-radius: 0.375rem; }
        .file-tree-item:hover { color: #00FFA3; background-color: rgba(0,255,163,0.05) !important; }
        .file-tree-item.selected { color: #00FFA3 !important; background-color: rgba(0,255,163,0.1) !important; font-weight: 600; }
        .file-tree ul { padding-left: 1rem; }
        
        .file-content-panel { background-color: #13141a !important; border: 1px solid #27272a !important; border-radius: 0.75rem !important; box-shadow: none !important; overflow: hidden; }
        .file-content-header { background-color: rgba(9, 9, 11, 0.5) !important; border-bottom: 1px solid #27272a !important; padding: 0.75rem 1.25rem !important; }
        .file-content-path { color: #a1a1aa !important; font-family: 'JetBrains Mono', monospace !important; }
        
        .file-content-body pre { background-color: transparent !important; border: none !important; padding: 0 !important; }
        .code-line-number { color: #3f3f46 !important; border-right: 1px solid #27272a !important; font-family: 'JetBrains Mono', monospace; }
        .code-line-content { font-family: 'JetBrains Mono', monospace; color: #e4e4e7; }
        
        .action-bar { background-color: transparent !important; box-shadow: none !important; padding: 0 !important; margin-top: 1.5rem; }
        .version-bar { background-color: transparent !important; box-shadow: none !important; padding: 0 !important; border: none !important; margin-bottom: 0 !important; }
        .version-tag { font-family: 'JetBrains Mono', monospace; background-color: rgba(0,255,163,0.05) !important; border: 1px solid rgba(0,255,163,0.2) !important; color: #00FFA3 !important; }
        
        select { font-family: 'JetBrains Mono', monospace !important; background-color: #09090b !important; border: 1px solid #27272a !important; color: #fff !important; padding: 0.5rem 1rem; border-radius: 0.5rem; outline: none; }
        select:focus { border-color: #00FFA3 !important; }
    </style>
</head>
<body class="app-devtools text-base-200 font-sans min-h-screen">
    <!-- 导航栏 -->
    <nav class="navbar z-50">
        <div class="container flex items-center justify-between mx-auto px-4 sm:px-6 lg:px-8 max-w-7xl">
            <div class="flex items-center gap-8">
                <a href="/" class="flex items-center gap-2 text-lg tracking-tight select-none hover:opacity-80 transition-opacity">
                    <span class="text-neon-400 drop-shadow-[0_0_8px_rgba(0,255,163,0.4)]">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                    </span>
                    <span class="text-white font-bold font-mono">Skill Base</span>
                </a>
                <div class="hidden md:flex items-baseline space-x-6 text-sm font-medium font-mono">
                    <a href="/" class="text-base-400 hover:text-white transition-colors flex items-center gap-1.5" data-i18n="nav.home">首页</a>
                    <a href="/publish.html" class="text-base-400 hover:text-white transition-colors flex items-center gap-1.5 hide-mobile" data-i18n="nav.publish">发布</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="page-content">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 max-w-7xl pt-4 pb-16">
            
            <!-- 面包屑 -->
            <div class="text-sm text-base-400 font-mono mb-6 flex items-center flex-wrap gap-2">
                <span class="text-neon-400">~</span>
                <span class="opacity-50">/</span>
                <a href="/" class="hover:text-white transition-colors">home</a>
                <span class="opacity-50">/</span>
                <a href="#" id="breadcrumb-skill" class="hover:text-white transition-colors" data-i18n="state.loading">加载中...</a>
                <span class="opacity-50">/</span>
                <span id="breadcrumb-file" class="text-white">file</span>
            </div>

            <!-- 控制区 -->
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6 p-4 bg-base-900 border border-base-800 rounded-xl relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-base-800 text-base-400 text-[10px] font-mono px-2 py-1 rounded-bl-lg opacity-50 select-none">FILE-VIEW</div>
                
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-mono text-base-400" data-i18n="file.currentVersion">Current:</span>
                        <span id="current-version" class="version-tag text-xs">-</span>
                    </div>
                    <span id="file-size" class="text-xs font-mono text-base-400">-</span>
                </div>

                <div class="flex items-center gap-3">
                    <select id="version-select" onchange="onVersionChange(this.value)" class="text-xs py-2">
                        <option value="" data-i18n="file.selectOtherVersion">切换版本...</option>
                    </select>
                    <button class="btn btn-primary btn-sm flex items-center gap-2 h-9" onclick="downloadCurrentVersion()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <span data-i18n="file.download">下载</span>
                    </button>
                    <button class="btn btn-secondary btn-sm flex items-center gap-2 h-9" onclick="goToDiff()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                        <span data-i18n="file.compare">对比</span>
                    </button>
                    <button class="btn btn-secondary btn-sm flex items-center gap-2 h-9" onclick="goToSkillDetail()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    </button>
                </div>
            </div>

            <!-- 文件区 -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <!-- 左侧文件树 -->
                <div class="file-tree-panel flex flex-col h-[600px] bg-base-900 border border-base-800 rounded-xl overflow-hidden">
                    <div class="px-4 py-3 border-b border-base-800 bg-base-950/50 flex items-center gap-2 font-mono text-xs text-base-400">
                        <span class="w-2.5 h-2.5 rounded-full bg-base-800"></span>
                        <span class="w-2.5 h-2.5 rounded-full bg-base-800"></span>
                        <span class="w-2.5 h-2.5 rounded-full bg-base-800"></span>
                        <span class="ml-2 text-white/50" data-i18n="file.fileDir">ls -R</span>
                    </div>
                    <div class="flex-1 overflow-y-auto no-scrollbar p-3">
                        <div id="file-tree" class="file-tree">
                            <div class="flex justify-center py-8">
                                <div class="spinner spinner-sm"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右侧文件内容 -->
                <div class="file-content-panel lg:col-span-3 flex flex-col h-[600px] bg-base-900 border border-base-800 rounded-xl overflow-hidden">
                    <div class="file-content-header flex justify-between items-center bg-base-950/50">
                        <div class="flex items-center gap-2 font-mono text-xs text-base-400">
                            <span class="text-neon-400">cat</span>
                            <span id="file-path" class="text-white">...</span>
                        </div>
                    </div>
                    <div id="file-content" class="file-content-body flex-1 overflow-auto bg-[#09090b] text-sm">
                        <div class="flex flex-col items-center justify-center h-full text-base-400 font-mono opacity-50">
                            <div class="flex items-center gap-3 mb-4">
                                <span class="text-neon-400 animate-pulse">_</span>
                                <span>EOF</span>
                            </div>
                            <p data-i18n="file.clickFile">Select a file to preview</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/file.js"></script>
</body>
</html>
