<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="alternate icon" sizes="32x32" href="./favicon-32x32.png">
    <link rel="alternate icon" sizes="16x16" href="./favicon-16x16.png">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link rel="manifest" href="./site.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Base</title>
    <script>
      (function () {
        try {
          var k = 'skill-base-theme'
          var v = localStorage.getItem(k)
          var p = v === 'light' || v === 'dark' || v === 'system' ? v : 'dark'
          var dark = p === 'dark' || (p === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="src/main.ts"></script>
  </body>
</html>
